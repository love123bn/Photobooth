<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pinky App</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=Nunito:wght@400;600;700&family=Pacifico&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="mobile-container">
        <header class="app-header">
            <h1 id="header-title">Lịch Vạn Niên</h1>
        </header>

        <main class="app-content">
            <!-- TAB LỊCH VẠN NIÊN -->
            <section id="tab-calendar" class="tab-pane active">
                <div class="calendar-container">
                    <div class="calendar-header">
                        <button id="prev-month"><i class="fas fa-chevron-left"></i></button>
                        <h2 id="month-year">Tháng 6 2026</h2>
                        <button id="next-month"><i class="fas fa-chevron-right"></i></button>
                    </div>
                    <div class="calendar-weekdays">
                        <div>CN</div><div>T2</div><div>T3</div><div>T4</div><div>T5</div><div>T6</div><div>T7</div>
                    </div>
                    <div class="calendar-days" id="calendar-days">
                        <!-- Days will be generated by JS -->
                    </div>
                </div>
                <div class="lunar-info" id="lunar-info">
                    <p>Chọn một ngày để xem chi tiết</p>
                </div>
            </section>

            <!-- TAB NHẬT KÝ -->
            <section id="tab-diary" class="tab-pane">
                <div class="diary-input-section">
                    <textarea id="diary-text" placeholder="Hôm nay của bạn thế nào? (✿◠‿◠)"></textarea>
                    <div class="diary-actions">
                        <div class="camera-options" style="display: flex; gap: 5px;">
                            <label for="diary-photo-gallery" class="btn-cute" title="Thư viện ảnh"><i class="fas fa-image"></i></label>
                            <input type="file" id="diary-photo-gallery" class="diary-photo-input" accept="image/*" hidden>

                            <button type="button" id="btn-cam-front" class="btn-cute" title="Cam trước"><i class="fas fa-user-circle"></i></button>
                            <button type="button" id="btn-cam-rear" class="btn-cute" title="Cam sau"><i class="fas fa-camera"></i></button>
                        </div>
                        <button id="save-diary" class="btn-cute primary">Lưu nhật ký</button>
                    </div>
                    <div id="photo-preview-container" style="display: none;">
                        <img id="photo-preview" src="" alt="Preview">
                        <button id="remove-photo"><i class="fas fa-times"></i></button>
                    </div>
                </div>
                <div class="diary-filter-section" style="margin-bottom: 15px; background: var(--white); padding: 10px; border-radius: var(--border-radius); box-shadow: var(--shadow); display: flex; align-items: center; justify-content: space-between;">
                    <label for="diary-date-filter" style="font-weight: 600; color: var(--secondary-color);">Xem ngày:</label>
                    <input type="date" id="diary-date-filter" class="cute-select" style="width: auto; padding: 5px 10px;">
                </div>
                <div class="diary-entries" id="diary-entries">
                    <!-- Entries will appear here -->
                </div>
            </section>

            <!-- TAB ĐỒNG HỒ -->
            <section id="tab-clock" class="tab-pane">
                <div class="clock-container">
                    <div class="analog-clock">
                        <!-- Clock Numbers -->
                        <div class="clock-number num1">1</div>
                        <div class="clock-number num2">2</div>
                        <div class="clock-number num3">3</div>
                        <div class="clock-number num4">4</div>
                        <div class="clock-number num5">5</div>
                        <div class="clock-number num6">6</div>
                        <div class="clock-number num7">7</div>
                        <div class="clock-number num8">8</div>
                        <div class="clock-number num9">9</div>
                        <div class="clock-number num10">10</div>
                        <div class="clock-number num11">11</div>
                        <div class="clock-number num12">12</div>
                        
                        <div class="hand hour-hand" id="hour-hand"></div>
                        <div class="hand min-hand" id="min-hand"></div>
                        <div class="hand second-hand" id="second-hand"></div>
                        <div class="clock-center"></div>
                    </div>
                    <div class="digital-clock" id="digital-clock">00:00:00</div>
                    <div class="current-date" id="current-date">Thứ Hai, 1 tháng 1</div>
                </div>
            </section>



            <!-- TAB CÀI ĐẶT -->
            <section id="tab-settings" class="tab-pane">
                <div class="settings-container">
                    <div class="setting-group">
                        <h3><i class="fas fa-palette"></i> Màu Sắc Chủ Đạo</h3>
                        <div class="color-options" id="theme-options">
                            <button class="color-btn active" data-primary="#ffb6c1" data-secondary="#ff69b4" data-bg="#fff0f5" style="background: #ffb6c1;"></button>
                            <button class="color-btn" data-primary="#add8e6" data-secondary="#4169e1" data-bg="#f0f8ff" style="background: #add8e6;"></button>
                            <button class="color-btn" data-primary="#dda0dd" data-secondary="#9370db" data-bg="#f8f8ff" style="background: #dda0dd;"></button>
                            <button class="color-btn" data-primary="#98fb98" data-secondary="#3cb371" data-bg="#f5fffa" style="background: #98fb98;"></button>
                            <button class="color-btn" data-primary="#f0e68c" data-secondary="#ff8c00" data-bg="#fffff0" style="background: #f0e68c;"></button>
                        </div>
                    </div>

                    <div class="setting-group">
                        <h3><i class="fas fa-font"></i> Phông Chữ</h3>
                        <select id="font-select" class="cute-select">
                            <option value="'Quicksand', sans-serif">Quicksand (Mặc định)</option>
                            <option value="'Nunito', sans-serif">Nunito (Bo tròn)</option>
                            <option value="'Comic Sans MS', cursive, sans-serif">Comic Sans (Đáng yêu)</option>
                            <option value="'Pacifico', cursive">Pacifico (Nghệ thuật)</option>
                            <option value="'Roboto', sans-serif">Roboto (Cơ bản)</option>
                            <option value="'Arial', sans-serif">Arial (Truyền thống)</option>
                        </select>
                    </div>
                </div>
            </section>
        </main>

        <!-- CAMERA MODAL -->
        <div id="camera-modal" class="camera-modal" style="display: none;">
            <video id="camera-video" autoplay playsinline></video>
            <div class="camera-controls">
                <button type="button" id="btn-close-camera" class="cam-btn"><i class="fas fa-times"></i></button>
                <button type="button" id="btn-capture" class="cam-btn capture-btn"><i class="fas fa-circle"></i></button>
                <button type="button" id="btn-switch-camera" class="cam-btn"><i class="fas fa-sync-alt"></i></button>
            </div>
            <canvas id="camera-canvas" style="display: none;"></canvas>
        </div>

        <!-- EDIT MODAL -->
        <div id="edit-modal" class="custom-modal" style="display: none;">
            <div class="modal-content">
                <h3><i class="fas fa-edit"></i> Sửa Nhật Ký</h3>
                <textarea id="edit-text-input" class="cute-textarea"></textarea>
                <div class="modal-actions">
                    <button id="btn-cancel-edit" class="btn-cute">Hủy</button>
                    <button id="btn-save-edit" class="btn-cute primary">Lưu</button>
                </div>
            </div>
        </div>

        <nav class="bottom-nav">
            <a href="#" class="nav-item active" data-target="tab-calendar" data-title="Lịch Vạn Niên">
                <i class="fas fa-calendar-alt"></i>
                <span>Lịch</span>
            </a>
            <a href="#" class="nav-item" data-target="tab-diary" data-title="Nhật Ký">
                <i class="fas fa-book-heart"></i>
                <span>Nhật ký</span>
            </a>
            <a href="#" class="nav-item" data-target="tab-clock" data-title="Đồng Hồ">
                <i class="fas fa-clock"></i>
                <span>Đồng hồ</span>
            </a>

            <a href="#" class="nav-item" data-target="tab-settings" data-title="Cài Đặt">
                <i class="fas fa-cog"></i>
                <span>Cài đặt</span>
            </a>
        </nav>
    </div>
    <script src="app.js"></script>
</body>
</html>
